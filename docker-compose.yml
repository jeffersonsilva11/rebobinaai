# docker-compose.yml
# Rebobina.ai — Infraestrutura local
# Comando: docker-compose up -d
#
# Portas mapeadas no host (escolhidas para não conflitar com outros projetos):
#   Postgres         → localhost:5433
#   Redis            → localhost:6380
#   Redis Commander  → localhost:8082  (opcional, sobe com `--profile tools`)
#   (App Next.js roda em localhost:3002 — ver package.json)

version: '3.8'

services:
  # PostgreSQL 16 com extensão pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rebobina_postgres
    environment:
      POSTGRES_USER: rebobina
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: rebobina_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebobina -d rebobina_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para BullMQ e cache
  redis:
    image: redis:7-alpine
    container_name: rebobina_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Redis Commander (UI para Redis — opcional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rebobina_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    profiles:
      - tools  # só sobe com: docker-compose --profile tools up

volumes:
  postgres_data:
  redis_data:
